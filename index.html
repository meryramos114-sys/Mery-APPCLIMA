<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima Neon</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container d-flex flex-column vh-100 justify-content-center align-items-center py-4">
        
        <!-- Título con efecto neón -->
        <div class="text-center mb-5">
            <h1 class="neon-title display-3 fw-bold">
                <i class="fas fa-cloud-sun-rain me-3"></i>CLIMA NEON
            </h1>
            <p class="lead text-white-50">Busca el clima en cualquier ciudad del mundo</p>
        </div>

        <!-- Barra de búsqueda centrada -->
        <form id="search-form" class="w-100 mb-5" style="max-width: 520px;">
            <div class="input-group input-group-lg neon-input-group">
                <input 
                    type="text" 
                    id="city-input"
                    class="form-control neon-input" 
                    placeholder="Ingresa una ciudad (ej: Santo Domingo, Madrid...)"
                    autocomplete="off"
                    required>
                <button type="submit" class="btn neon-btn">
                    <i class="fas fa-search fa-lg"></i>
                </button>
            </div>
        </form>

        <!-- Contenedor de tarjetas -->
        <div id="cards-container" class="row w-100 justify-content-center g-4"></div>
    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
